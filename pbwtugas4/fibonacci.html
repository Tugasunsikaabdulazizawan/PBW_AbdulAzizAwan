<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Deret Fibonacci</h1>
    <ul id="hasil-fibonacci"></ul>
    <script>
        function cetakFibonacci(jumlahSuku) {
            let n1 = 0, n2 = 1, angkaBerikutnya;
            
            const listOutput = document.getElementById("hasil-fibonacci");

            for (let i = 1; i <= jumlahSuku; i++) {
                let li = document.createElement("li");
                li.textContent = n1;
                listOutput.appendChild(li);

                angkaBerikutnya = n1 + n2;
                n1 = n2;
                n2 = angkaBerikutnya;
            }
        }

        cetakFibonacci(15);
    </script>
</body>
</html>
